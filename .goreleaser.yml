version: 2

project_name: requests

builds:
  - id: requests
    main: ./cmd/requests
    binary: requests
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/bluefunda/trm-cli/internal/cmd.Version={{ .Version }}
    flags:
      - -trimpath

archives:
  - id: requests
    name_template: "requests_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
      - zip
    format_overrides:
      - goos: darwin
        formats:
          - zip
      - goos: linux
        formats:
          - tar.gz
    files:
      - none*

nfpms:
  - id: requests
    package_name: requests
    ids:
      - requests
    vendor: Bluefunda
    maintainer: Bluefunda <support@bluefunda.com>
    description: Cross-platform CLI for the bluerequests change/release management platform.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /opt/requests/bin
    contents:
      - dst: /opt/requests/etc
        type: dir
      - dst: /opt/requests/log
        type: dir
      - dst: /usr/local/bin/requests
        src: /opt/requests/bin/requests
        type: symlink

homebrew_casks:
  - name: requests
    ids:
      - requests
    binaries:
      - requests
    homepage: https://github.com/bluefunda/trm-cli
    description: CLI for the bluerequests change/release management platform.
    directory: Casks
    repository:
      owner: bluefunda
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: bluefunda
    name: trm-cli
  draft: false
  replace_existing_draft: true
  name_template: "requests CLI v{{ .Version }}"
  header: |
    ## requests CLI v{{ .Version }}

    Cross-platform CLI for the bluerequests change/release management platform.

    ### Installation

    **One-line installer (macOS and Linux):**
    ```bash
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/bluefunda/trm-cli/main/install.sh)"
    ```

    **Homebrew (macOS):**
    ```bash
    brew tap bluefunda/tap
    brew install --cask requests
    ```

    **Debian/Ubuntu (x86_64):**
    ```bash
    curl -sL https://github.com/bluefunda/trm-cli/releases/download/v{{ .Version }}/requests_{{ .Version }}_linux_amd64.deb -o requests.deb
    sudo dpkg -i requests.deb
    ```

    **Debian/Ubuntu (ARM64):**
    ```bash
    curl -sL https://github.com/bluefunda/trm-cli/releases/download/v{{ .Version }}/requests_{{ .Version }}_linux_arm64.deb -o requests.deb
    sudo dpkg -i requests.deb
    ```

    **Linux (manual):**
    ```bash
    curl -sL https://github.com/bluefunda/trm-cli/releases/download/v{{ .Version }}/requests_{{ .Version }}_linux_amd64.tar.gz | tar xz
    chmod +x requests && sudo mv requests /usr/local/bin/
    ```

snapshot:
  version_template: "{{ incpatch .Version }}-next"
