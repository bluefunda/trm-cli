name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v1.1.0)'
        required: true
        type: string

jobs:
  release:
    if: github.event_name == 'push'
    uses: bluefunda/release-foundry/.github/workflows/release-please.yml@main
    permissions:
      contents: write
      pull-requests: write
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}

  goreleaser:
    needs: [release]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.release.outputs.release_created) }}
    uses: bluefunda/release-foundry/.github/workflows/go-binary-release.yml@main
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release.outputs.tag_name }}
    permissions:
      contents: write
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
      NOTARIZATION_ISSUER_ID: ${{ secrets.NOTARIZATION_ISSUER_ID }}
      NOTARIZATION_KEY_ID: ${{ secrets.NOTARIZATION_KEY_ID }}
      NOTARIZATION_KEY: ${{ secrets.NOTARIZATION_KEY }}

  docker:
    needs: [release]
    if: ${{ needs.release.outputs.release_created }}
    uses: bluefunda/release-foundry/.github/workflows/docker-deploy.yml@main
    with:
      tag: ${{ needs.release.outputs.tag_name }}
      build-args: VERSION=${{ needs.release.outputs.tag_name }}
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}

  release-notes:
    needs: [release, goreleaser]
    if: ${{ needs.release.outputs.release_created }}
    uses: bluefunda/release-foundry/.github/workflows/github-release-notes.yml@main
    with:
      tag: ${{ needs.release.outputs.tag_name }}
      mode: append
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
