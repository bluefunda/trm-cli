name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v1.1.0)'
        required: true
        type: string

jobs:
  release:
    if: github.event_name == 'push'
    uses: bluefunda/release-foundry/.github/workflows/release-please.yml@main
    permissions:
      contents: write
      pull-requests: write
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}

  goreleaser:
    needs: [release]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.release.outputs.release_created) }}
    uses: bluefunda/release-foundry/.github/workflows/go-binary-release.yml@main
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release.outputs.tag_name }}
    permissions:
      contents: write
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

