name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v1.1.0)'
        required: true
        type: string

jobs:
  release:
    if: github.event_name == 'push'
    uses: bluefunda/release-foundry/.github/workflows/release-please.yml@main
    permissions:
      contents: write
      pull-requests: write
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}

  goreleaser:
    needs: [release]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.release.outputs.release_created) }}
    uses: bluefunda/release-foundry/.github/workflows/go-binary-release.yml@main
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release.outputs.tag_name }}
    permissions:
      contents: write
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  docker:
    needs: [release]
    if: ${{ needs.release.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ needs.release.outputs.tag_name }}
          tags: |
            bluefunda/trm-cli:${{ needs.release.outputs.tag_name }}
            bluefunda/trm-cli:latest
            ghcr.io/bluefunda/trm-cli:${{ needs.release.outputs.tag_name }}
            ghcr.io/bluefunda/trm-cli:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: bluefunda/trm-cli
          readme-filepath: ./README.md
          short-description: "requests CLI — change and release management for SAP operations"

